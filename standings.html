<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standings — DraftZone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  </head>
<body>

  <header>
    <a href="home.html" class="logo">Draft<span>Zone</span></a>
    <div class="header-divider"></div>
    <nav>
      <a href="home.html"      class="nav-link">Home</a>
      <a href="stats.html"     class="nav-link">Stats</a>
      <a href="matches.html"   class="nav-link">Matches</a>
      <a href="index.html"     class="nav-link">Draft</a>
      <a href="dashboard.html" class="nav-link">My Team</a>
      <a href="standings.html" class="nav-link active">Standings</a>
    </nav>
  </header>

  <main>
    <div id="content">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
  </main>

  <script type="module">
    import {
      db, ref, get, subscribeLobby,
      ensureAuth, LS, CONFIG, SCORING
    } from "./app.js";

    const session = LS.getSession();

    if (!session) {
      window.location.href = "index.html";
    }

    const { uid: myUid, lobbyCode } = session;

    // Returns averaged stats from tournament matches if any exist,
    // otherwise falls back to seeded stats from players.json
    function resolveStats(playerId, pData, matchData, tournamentId) {
      const statKeys = ["rating", "kd", "acs", "adr", "kpr"];
      const tournamentMatches = matchData.filter(m =>
        m.status === "completed" && m.tournamentId === tournamentId &&
        m.playerStats?.some(s => s.playerId === playerId)
      );
      if (tournamentMatches.length > 0) {
        const history = tournamentMatches.map(m => m.playerStats.find(s => s.playerId === playerId));
        const avg = {};
        statKeys.forEach(key => {
          avg[key] = +(history.reduce((s, h) => s + (h[key] ?? 0), 0) / history.length).toFixed(2);
        });
        return { stats: avg, tracked: true, matchCount: tournamentMatches.length };
      }
      const { cl: _cl, ...baseStats } = pData.stats || {};
      return { stats: baseStats, tracked: false, matchCount: 0 };
    }

    // Track which rows are expanded
    const expanded = new Set();

    async function loadData() {
      const [playerData, matchData, tournamentData] = await Promise.all([
        fetch("data/players.json").then(r => r.json()).catch(() => []),
        fetch("data/matches.json").then(r => r.json()).catch(() => []),
        fetch("data/tournaments.json").then(r => r.json()).catch(() => []),
      ]);
      return { playerData, matchData, tournamentData };
    }

    // ── Build per-participant standings ────────────────
    function buildStandings(lobbyData, playerMap, matchData, tournamentId) {
      const { players, picks = {}, pickOrder = [] } = lobbyData;
      const picksArr = Object.values(picks);

      return Object.entries(players || {}).map(([uid, p]) => {
        const myPicksList = picksArr.filter(pk => pk.byUid === uid);

        const enriched = myPicksList.map(pick => {
          const pData     = playerMap[pick.playerId] || {};
          const { stats, tracked, matchCount } = resolveStats(pick.playerId, pData, matchData, tournamentId);
          const pts       = +SCORING.totalFromMatches(pick.playerId, matchData, tournamentId).toFixed(1);
          const breakdown = SCORING.breakdown(stats);
          const history   = SCORING.matchHistory(pick.playerId, matchData, tournamentId);
          return { ...pick, pData, stats, pts, breakdown, history, tracked, matchCount };
        });

        const totalScore = +enriched.reduce((s, e) => s + e.pts, 0).toFixed(1);

        return {
          uid,
          name:   p.name,
          isHost: p.isHost,
          picks:  enriched,
          totalScore,
          pickCount: enriched.length,
        };
      }).sort((a, b) => b.totalScore - a.totalScore);
    }

    // ── Rank color helper ──────────────────────────────
    function rankClass(i) {
      return i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";
    }

    function rankMedal(i) {
      return i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "";
    }

    // ── Render expanded roster rows ────────────────────
    function renderExpandedRow(entry) {
      if (entry.picks.length === 0) {
        return `<tr class="roster-expand-row show" id="expand-${entry.uid}">
          <td class="roster-expand-cell" colspan="5">
            <div style="color:var(--muted); font-size:0.85rem; padding:8px 0;">No picks yet.</div>
          </td>
        </tr>`;
      }

      const rows = entry.picks.map(p => `
        <div class="expand-player-row">
          <div class="expand-pick-label">${p.label || `${p.round}.${p.pick}`}</div>
          <div style="flex:1; min-width:0;">
            <div class="expand-player-name">
              ${p.playerName}
              ${p.skipped ? '<span class="skipped-tag">Auto</span>' : ""}
            </div>
            <div class="expand-player-meta">
              ${p.pData.team || p.playerTeam || "—"} ·
              ${p.pData.role || p.playerRole || "—"} ·
              ${p.pData.region || "—"}
              ${p.price ? ` · <span style="color:var(--accent2)">$${p.price}</span>` : ""}
              · ${p.tracked
                ? `<span style="font-size:0.65rem; color:var(--success); font-weight:700;">●Tracked (${p.matchCount})</span>`
                : `<span style="font-size:0.65rem; color:var(--muted); font-weight:700;">Seeded</span>`}
            </div>
          </div>
          <div class="expand-stat-chips">
            ${p.breakdown.map(b => `
              <div class="expand-chip">
                <div class="expand-chip-val">${b.stat === 'CL' ? `${b.value}%` : b.value}</div>
                <div class="expand-chip-label">${b.stat}<br><span style="color:var(--accent); font-size:0.65rem;">${b.points}pt</span></div>
              </div>
            `).join("")}
          </div>
          <div class="expand-pts">${p.pts} pts</div>
        </div>
      `).join("");

      return `<tr class="roster-expand-row show" id="expand-${entry.uid}">
        <td class="roster-expand-cell" colspan="5">
          <div class="roster-expand-grid">${rows}</div>
        </td>
      </tr>`;
    }

    // ── Main render ────────────────────────────────────
    function render(lobbyData, playerData, matchData, tournamentData) {
      const content = document.getElementById("content");

      if (!lobbyData) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-title">No active draft found.</div>
            <p>Create or join a lobby to get started.</p>
          </div>`;
        return;
      }

      const playerMap    = Object.fromEntries(playerData.map(p => [p.id, p]));
      const tournamentId = lobbyData.tournamentId || null;
      const tournament   = tournamentData.find(t => t.id === tournamentId);
      const standings    = buildStandings(lobbyData, playerMap, matchData, tournamentId);
      const isLive       = lobbyData.status === "drafting";
      const top3         = standings.slice(0, 3);

      const tournamentLabel = tournament
        ? `· <span style="color:var(--accent); font-family:var(--font-mono);">📋 ${tournament.name}</span>`
        : "";

      const podiumHTML = top3.length > 0 ? `
        <div class="podium">
          ${top3.map((e, i) => `
            <div class="podium-card rank-${i + 1}">
              <div class="podium-medal">${rankMedal(i)}</div>
              <div class="podium-rank">${i === 0 ? "1st" : i === 1 ? "2nd" : "3rd"}</div>
              <div class="podium-name">${e.name}${e.uid === myUid ? ' <span style="color:var(--accent); font-size:0.75rem;">(You)</span>' : ""}</div>
              <div class="podium-score">${e.totalScore}</div>
              <div class="podium-picks">${e.pickCount} pick${e.pickCount !== 1 ? "s" : ""}</div>
            </div>
          `).join("")}
        </div>
      ` : "";

      const tableRows = standings.map((e, i) => {
        const isExpanded = expanded.has(e.uid);
        const expandRow  = isExpanded ? renderExpandedRow(e) : `<tr class="roster-expand-row" id="expand-${e.uid}"></tr>`;

        return `
          <tr class="standings-row${e.uid === myUid ? " is-me" : ""}${isExpanded ? " expanded" : ""}"
              data-uid="${e.uid}" onclick="toggleExpand('${e.uid}')">
            <td class="rank-cell ${rankClass(i)}">${rankMedal(i) || `#${i + 1}`}</td>
            <td class="name-cell">
              ${e.name}
              ${e.uid === myUid ? '<span class="you-tag">You</span>' : ""}
              ${e.isHost        ? '<span style="font-size:0.65rem; color:var(--accent2); margin-left:6px;">Host</span>' : ""}
            </td>
            <td class="picks-cell">${e.pickCount} / ${CONFIG.ROSTER_SIZE}</td>
            <td class="score-cell">${e.totalScore}</td>
            <td class="expand-cell">${isExpanded ? "▲" : "▼"}</td>
          </tr>
          ${expandRow}
        `;
      }).join("");

      content.innerHTML = `
        <div class="page-title">Standings</div>
        <div class="page-sub">
          Lobby <span style="font-family:var(--font-mono); color:var(--accent);">${lobbyCode}</span>
          · ${standings.length} participants
          ${tournamentLabel}
          · ${isLive
              ? '<span class="live-dot"></span><span style="color:var(--success);">Live</span>'
              : '<span style="color:var(--muted);">Draft Complete</span>'}
        </div>

        ${podiumHTML}

        <table class="standings-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Participant</th>
              <th>Picks</th>
              <th>Score</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="standings-tbody">
            ${tableRows}
          </tbody>
        </table>
      `;
    }

    // ── Toggle expanded roster ─────────────────────────
    window.toggleExpand = function(uid) {
      if (expanded.has(uid)) {
        expanded.delete(uid);
      } else {
        expanded.add(uid);
      }
      if (window._lastLobbyData && window._lastPlayerData) {
        render(window._lastLobbyData, window._lastPlayerData, window._lastMatchData, window._lastTournamentData);
      }
    };

    // ── Init ───────────────────────────────────────────
    async function init() {
      await ensureAuth();
      const { playerData, matchData, tournamentData } = await loadData();
      window._lastPlayerData     = playerData;
      window._lastMatchData      = matchData;
      window._lastTournamentData = tournamentData;

      subscribeLobby(lobbyCode, (lobbyData) => {
        window._lastLobbyData = lobbyData;
        render(lobbyData, playerData, matchData, tournamentData);
      });
    }

    init();
  </script>

</body>
</html>
