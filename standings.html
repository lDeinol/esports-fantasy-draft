<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standings — DraftZone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0a0b0f;
      --surface:  #13151c;
      --surface2: #1c1f2b;
      --surface3: #22263a;
      --border:   #2a2d3a;
      --accent:   #00e5ff;
      --accent2:  #7c3aed;
      --danger:   #ff4757;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --success:  #10b981;
      --warn:     #f59e0b;
      --gold:     #f59e0b;
      --silver:   #9ca3af;
      --bronze:   #b45309;

      --font-display: 'Barlow Condensed', sans-serif;
      --font-body:    'Inter', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0;
      background: var(--surface);
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    .header-divider { width: 1px; height: 24px; background: var(--border); }

    nav { display: flex; gap: 4px; }

    .nav-link {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-decoration: none;
      color: var(--muted);
      transition: color 0.15s, background 0.15s;
    }
    .nav-link:hover  { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }

    /* ── Page ────────────────────────────────────────── */
    main {
      flex: 1;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .page-sub {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 28px;
    }

    /* ── Top 3 Podium ────────────────────────────────── */
    .podium {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      align-items: flex-end;
    }

    .podium-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      position: relative;
      transition: border-color 0.15s;
    }

    .podium-card.rank-1 {
      border-color: var(--gold);
      background: color-mix(in srgb, var(--gold) 5%, var(--surface));
      order: 2;
      padding-top: 28px;
    }
    .podium-card.rank-2 { order: 1; }
    .podium-card.rank-3 { order: 3; }

    .podium-medal {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }

    .podium-rank {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .podium-card.rank-1 .podium-rank { color: var(--gold); }
    .podium-card.rank-2 .podium-rank { color: var(--silver); }
    .podium-card.rank-3 .podium-rank { color: var(--bronze); }

    .podium-name {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      margin-bottom: 4px;
    }

    .podium-score {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
    }

    .podium-picks {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Full Standings Table ────────────────────────── */
    .standings-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 32px;
    }

    .standings-table th {
      text-align: left;
      padding: 10px 16px;
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .standings-table th:last-child,
    .standings-table td:last-child { text-align: right; }

    .standings-row {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
    }
    .standings-row:hover { background: var(--surface2); }
    .standings-row.is-me { background: color-mix(in srgb, var(--accent) 4%, transparent); }
    .standings-row.expanded { background: var(--surface2); }

    .standings-row td {
      padding: 14px 16px;
      vertical-align: middle;
    }

    .rank-cell {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      width: 40px;
    }

    .rank-cell.gold   { color: var(--gold); }
    .rank-cell.silver { color: var(--silver); }
    .rank-cell.bronze { color: var(--bronze); }

    .name-cell {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .you-tag {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      border-radius: 4px;
      padding: 2px 7px;
      margin-left: 8px;
    }

    .picks-cell {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--muted);
    }

    .score-cell {
      font-family: var(--font-mono);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--accent);
    }

    .expand-cell {
      color: var(--muted);
      font-size: 0.75rem;
      width: 24px;
    }

    /* ── Expanded Roster ─────────────────────────────── */
    .roster-expand-row { display: none; }
    .roster-expand-row.show { display: table-row; }

    .roster-expand-cell {
      padding: 0 16px 16px 56px;
      border-bottom: 1px solid var(--border);
    }

    .roster-expand-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .expand-player-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
    }

    .expand-pick-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      width: 30px;
      flex-shrink: 0;
    }

    .expand-player-name {
      font-size: 0.9rem;
      font-weight: 600;
      flex: 1;
    }

    .expand-player-meta {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .expand-stat-chips {
      display: flex;
      gap: 6px;
    }

    .expand-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      text-align: center;
    }

    .expand-chip-val   { font-family: var(--font-mono); font-size: 0.78rem; font-weight: 600; color: var(--text); }
    .expand-chip-label { font-size: 0.58rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .expand-pts {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent);
      min-width: 52px;
      text-align: right;
    }

    .skipped-tag {
      font-size: 0.65rem;
      color: var(--warn);
      background: color-mix(in srgb, var(--warn) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--warn) 25%, transparent);
      border-radius: 4px;
      padding: 1px 6px;
    }

    /* ── Empty / Loading ─────────────────────────────── */
    .loading-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px;
    }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* ── Live indicator ──────────────────────────────── */
    .live-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <header>
    <a href="home.html" class="logo">Draft<span>Zone</span></a>
    <div class="header-divider"></div>
    <nav>
      <a href="home.html"      class="nav-link">Home</a>
      <a href="stats.html"     class="nav-link">Stats</a>
      <a href="matches.html"   class="nav-link">Matches</a>
      <a href="index.html"     class="nav-link">Draft</a>
      <a href="dashboard.html" class="nav-link">My Team</a>
      <a href="standings.html" class="nav-link active">Standings</a>
    </nav>
  </header>

  <main>
    <div id="content">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
  </main>

  <script type="module">
    import {
      db, ref, get, subscribeLobby,
      ensureAuth, LS, CONFIG, SCORING
    } from "./app.js";

    const session = LS.getSession();

    if (!session) {
      window.location.href = "index.html";
    }

    const { uid: myUid, lobbyCode } = session;

    // Track which rows are expanded
    const expanded = new Set();

    async function loadData() {
      const [playerData, matchData, tournamentData] = await Promise.all([
        fetch("data/players.json").then(r => r.json()).catch(() => []),
        fetch("data/matches.json").then(r => r.json()).catch(() => []),
        fetch("data/tournaments.json").then(r => r.json()).catch(() => []),
      ]);
      return { playerData, matchData, tournamentData };
    }

    // ── Build per-participant standings ────────────────
    function buildStandings(lobbyData, playerMap, matchData, tournamentId) {
      const { players, picks = {}, pickOrder = [] } = lobbyData;
      const picksArr = Object.values(picks);

      return Object.entries(players || {}).map(([uid, p]) => {
        const myPicksList = picksArr.filter(pk => pk.byUid === uid);

        const enriched = myPicksList.map(pick => {
          const pData     = playerMap[pick.playerId] || {};
          const stats     = pData.stats || {};
          const pts       = +SCORING.totalFromMatches(pick.playerId, matchData, tournamentId).toFixed(1);
          const breakdown = SCORING.breakdown(stats);
          const history   = SCORING.matchHistory(pick.playerId, matchData, tournamentId);
          return { ...pick, pData, stats, pts, breakdown, history };
        });

        const totalScore = +enriched.reduce((s, e) => s + e.pts, 0).toFixed(1);

        return {
          uid,
          name:   p.name,
          isHost: p.isHost,
          picks:  enriched,
          totalScore,
          pickCount: enriched.length,
        };
      }).sort((a, b) => b.totalScore - a.totalScore);
    }

    // ── Rank color helper ──────────────────────────────
    function rankClass(i) {
      return i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";
    }

    function rankMedal(i) {
      return i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "";
    }

    // ── Render expanded roster rows ────────────────────
    function renderExpandedRow(entry) {
      if (entry.picks.length === 0) {
        return `<tr class="roster-expand-row show" id="expand-${entry.uid}">
          <td class="roster-expand-cell" colspan="5">
            <div style="color:var(--muted); font-size:0.85rem; padding:8px 0;">No picks yet.</div>
          </td>
        </tr>`;
      }

      const rows = entry.picks.map(p => `
        <div class="expand-player-row">
          <div class="expand-pick-label">${p.label || `${p.round}.${p.pick}`}</div>
          <div style="flex:1; min-width:0;">
            <div class="expand-player-name">
              ${p.playerName}
              ${p.skipped ? '<span class="skipped-tag">Auto</span>' : ""}
            </div>
            <div class="expand-player-meta">
              ${p.pData.team || p.playerTeam || "—"} ·
              ${p.pData.role || p.playerRole || "—"} ·
              ${p.pData.region || "—"}
              ${p.price ? ` · <span style="color:var(--accent2)">$${p.price}</span>` : ""}
            </div>
          </div>
          <div class="expand-stat-chips">
            ${p.breakdown.map(b => `
              <div class="expand-chip">
                <div class="expand-chip-val">${b.stat === 'CL' ? `${b.value}%` : b.value}</div>
                <div class="expand-chip-label">${b.stat}<br><span style="color:var(--accent); font-size:0.65rem;">${b.points}pt</span></div>
              </div>
            `).join("")}
          </div>
          <div class="expand-pts">${p.pts} pts</div>
        </div>
      `).join("");

      return `<tr class="roster-expand-row show" id="expand-${entry.uid}">
        <td class="roster-expand-cell" colspan="5">
          <div class="roster-expand-grid">${rows}</div>
        </td>
      </tr>`;
    }

    // ── Main render ────────────────────────────────────
    function render(lobbyData, playerData, matchData, tournamentData) {
      const content = document.getElementById("content");

      if (!lobbyData) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-title">No active draft found.</div>
            <p>Create or join a lobby to get started.</p>
          </div>`;
        return;
      }

      const playerMap    = Object.fromEntries(playerData.map(p => [p.id, p]));
      const tournamentId = lobbyData.tournamentId || null;
      const tournament   = tournamentData.find(t => t.id === tournamentId);
      const standings    = buildStandings(lobbyData, playerMap, matchData, tournamentId);
      const isLive       = lobbyData.status === "drafting";
      const top3         = standings.slice(0, 3);

      const tournamentLabel = tournament
        ? `· <span style="color:var(--accent); font-family:var(--font-mono);">📋 ${tournament.name}</span>`
        : "";

      const podiumHTML = top3.length > 0 ? `
        <div class="podium">
          ${top3.map((e, i) => `
            <div class="podium-card rank-${i + 1}">
              <div class="podium-medal">${rankMedal(i)}</div>
              <div class="podium-rank">${i === 0 ? "1st" : i === 1 ? "2nd" : "3rd"}</div>
              <div class="podium-name">${e.name}${e.uid === myUid ? ' <span style="color:var(--accent); font-size:0.75rem;">(You)</span>' : ""}</div>
              <div class="podium-score">${e.totalScore}</div>
              <div class="podium-picks">${e.pickCount} pick${e.pickCount !== 1 ? "s" : ""}</div>
            </div>
          `).join("")}
        </div>
      ` : "";

      const tableRows = standings.map((e, i) => {
        const isExpanded = expanded.has(e.uid);
        const expandRow  = isExpanded ? renderExpandedRow(e) : `<tr class="roster-expand-row" id="expand-${e.uid}"></tr>`;

        return `
          <tr class="standings-row${e.uid === myUid ? " is-me" : ""}${isExpanded ? " expanded" : ""}"
              data-uid="${e.uid}" onclick="toggleExpand('${e.uid}')">
            <td class="rank-cell ${rankClass(i)}">${rankMedal(i) || `#${i + 1}`}</td>
            <td class="name-cell">
              ${e.name}
              ${e.uid === myUid ? '<span class="you-tag">You</span>' : ""}
              ${e.isHost        ? '<span style="font-size:0.65rem; color:var(--accent2); margin-left:6px;">Host</span>' : ""}
            </td>
            <td class="picks-cell">${e.pickCount} / ${CONFIG.ROSTER_SIZE}</td>
            <td class="score-cell">${e.totalScore}</td>
            <td class="expand-cell">${isExpanded ? "▲" : "▼"}</td>
          </tr>
          ${expandRow}
        `;
      }).join("");

      content.innerHTML = `
        <div class="page-title">Standings</div>
        <div class="page-sub">
          Lobby <span style="font-family:var(--font-mono); color:var(--accent);">${lobbyCode}</span>
          · ${standings.length} participants
          ${tournamentLabel}
          · ${isLive
              ? '<span class="live-dot"></span><span style="color:var(--success);">Live</span>'
              : '<span style="color:var(--muted);">Draft Complete</span>'}
        </div>

        ${podiumHTML}

        <table class="standings-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Participant</th>
              <th>Picks</th>
              <th>Score</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="standings-tbody">
            ${tableRows}
          </tbody>
        </table>
      `;
    }

    // ── Toggle expanded roster ─────────────────────────
    window.toggleExpand = function(uid) {
      if (expanded.has(uid)) {
        expanded.delete(uid);
      } else {
        expanded.add(uid);
      }
      if (window._lastLobbyData && window._lastPlayerData) {
        render(window._lastLobbyData, window._lastPlayerData, window._lastMatchData, window._lastTournamentData);
      }
    };

    // ── Init ───────────────────────────────────────────
    async function init() {
      await ensureAuth();
      const { playerData, matchData, tournamentData } = await loadData();
      window._lastPlayerData     = playerData;
      window._lastMatchData      = matchData;
      window._lastTournamentData = tournamentData;

      subscribeLobby(lobbyCode, (lobbyData) => {
        window._lastLobbyData = lobbyData;
        render(lobbyData, playerData, matchData, tournamentData);
      });
    }

    init();
  </script>

</body>
</html>
