<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Team — DraftZone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0a0b0f;
      --surface:  #13151c;
      --surface2: #1c1f2b;
      --surface3: #22263a;
      --border:   #2a2d3a;
      --accent:   #00e5ff;
      --accent2:  #7c3aed;
      --danger:   #ff4757;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --success:  #10b981;
      --warn:     #f59e0b;

      --font-display: 'Barlow Condensed', sans-serif;
      --font-body:    'Inter', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0;
      background: var(--surface);
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    .header-divider { width: 1px; height: 24px; background: var(--border); }

    nav { display: flex; gap: 4px; }

    .nav-link {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-decoration: none;
      color: var(--muted);
      transition: color 0.15s, background 0.15s;
    }
    .nav-link:hover  { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }

    /* ── Page ────────────────────────────────────────── */
    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Page Title ──────────────────────────────────── */
    .page-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .page-sub {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 28px;
    }

    /* ── Score Hero ──────────────────────────────────── */
    .score-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 32px;
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 24px;
    }

    .score-main { flex: 1; }

    .score-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .score-value {
      font-family: var(--font-display);
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: var(--accent);
      line-height: 1;
    }

    .score-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 6px;
    }

    .score-breakdown {
      display: flex;
      gap: 20px;
    }

    .score-stat {
      text-align: center;
    }

    .score-stat-val {
      font-family: var(--font-mono);
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
    }

    .score-stat-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    /* ── Draft info row ──────────────────────────────── */
    .info-row {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .info-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .info-pill strong { color: var(--text); }

    /* ── Section header ──────────────────────────────── */
    .section-title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Player Cards ────────────────────────────────── */
    .roster-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .roster-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.15s;
    }

    .roster-card:hover { border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); }

    .pick-num {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      width: 32px;
      flex-shrink: 0;
    }

    .player-info { flex: 1; min-width: 0; }

    .player-name {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .stat-chips {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      text-align: center;
      min-width: 60px;
    }

    .stat-chip-val {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .stat-chip-label {
      font-size: 0.6rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 1px;
    }

    .player-pts {
      text-align: right;
      flex-shrink: 0;
    }

    .player-pts-val {
      font-family: var(--font-mono);
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--accent);
    }

    .player-pts-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* auction price badge */
    .price-badge {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent2);
      background: color-mix(in srgb, var(--accent2) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent2) 30%, transparent);
      border-radius: 4px;
      padding: 2px 8px;
    }

    .skipped-badge {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--warn);
      background: color-mix(in srgb, var(--warn) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--warn) 30%, transparent);
      border-radius: 4px;
      padding: 2px 8px;
    }

    /* ── Empty / Loading states ──────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      background: var(--accent);
      color: var(--bg);
      border-radius: 8px;
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-decoration: none;
      text-transform: uppercase;
    }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px;
    }

    /* ── Budget bar (auction) ────────────────────────── */
    .budget-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: none;
    }

    .budget-section.show { display: block; }

    .budget-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .budget-label-text { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .budget-numbers { font-family: var(--font-mono); font-size: 0.9rem; }
    .budget-spent  { color: var(--danger); }
    .budget-left   { color: var(--success); }

    .budget-track { height: 6px; background: var(--border); border-radius: 3px; }
    .budget-fill  { height: 6px; background: var(--success); border-radius: 3px; transition: width 0.4s; }
  </style>
</head>
<body>

  <header>
    <a href="home.html" class="logo">Draft<span>Zone</span></a>
    <div class="header-divider"></div>
    <nav>
      <a href="home.html"      class="nav-link">Home</a>
      <a href="stats.html"     class="nav-link">Stats</a>
      <a href="matches.html"   class="nav-link">Matches</a>
      <a href="index.html"     class="nav-link">Draft</a>
      <a href="dashboard.html" class="nav-link active">My Team</a>
      <a href="standings.html" class="nav-link">Standings</a>
    </nav>
  </header>

  <main>
    <div id="content">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
  </main>

  <script type="module">
    import {
      db, ref, get, subscribeLobby,
      ensureAuth, LS, CONFIG, SCORING
    } from "./app.js";

    const session = LS.getSession();

    // ── No session → redirect ──────────────────────────
    if (!session) {
      window.location.href = "index.html";
    }

    const { uid: myUid, name: myName, lobbyCode } = session;

    // ── Load data ──────────────────────────────────────
    // Returns averaged stats from tournament matches if any exist,
    // otherwise falls back to seeded stats from players.json
    function resolveStats(playerId, pData, matchData, tournamentId) {
      const statKeys = ["rating", "kd", "acs", "adr", "kpr"];
      const tournamentMatches = matchData.filter(m =>
        m.status === "completed" && m.tournamentId === tournamentId &&
        m.playerStats?.some(s => s.playerId === playerId)
      );
      if (tournamentMatches.length > 0) {
        const history = tournamentMatches.map(m => m.playerStats.find(s => s.playerId === playerId));
        const avg = {};
        statKeys.forEach(key => {
          avg[key] = +(history.reduce((s, h) => s + (h[key] ?? 0), 0) / history.length).toFixed(2);
        });
        return { stats: avg, tracked: true, matchCount: tournamentMatches.length };
      }
      const { cl: _cl, ...baseStats } = pData.stats || {};
      return { stats: baseStats, tracked: false, matchCount: 0 };
    }
      const [playerData, matchData, tournamentData] = await Promise.all([
        fetch("data/players.json").then(r => r.json()).catch(() => []),
        fetch("data/matches.json").then(r => r.json()).catch(() => []),
        fetch("data/tournaments.json").then(r => r.json()).catch(() => []),
      ]);
      return { playerData, matchData, tournamentData };
    }

    // ── Render ─────────────────────────────────────────
    function render(lobbyData, playerData, matchData, tournamentData) {
      const content = document.getElementById("content");

      if (!lobbyData) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-title">No active draft found.</div>
            <p>Create or join a lobby to get started.</p>
            <a href="index.html" class="empty-btn">Go Home</a>
          </div>`;
        return;
      }

      const picks        = lobbyData.picks || {};
      const myPicks      = Object.values(picks).filter(p => p.byUid === myUid);
      const playerMap    = Object.fromEntries(playerData.map(p => [p.id, p]));
      const format       = lobbyData.format;
      const tournamentId = lobbyData.tournamentId || null;
      const budgets      = lobbyData.budgets || {};
      const spent        = budgets[myUid] || 0;
      const remaining    = CONFIG.AUCTION_BUDGET - spent;

      // Tournament name
      const tournament   = tournamentData.find(t => t.id === tournamentId);
      const tournamentLabel = tournament
        ? `<span style="color:var(--accent); font-family:var(--font-mono); font-size:0.8rem;">📋 ${tournament.name}</span>`
        : `<span style="color:var(--muted); font-size:0.8rem;">No tournament selected</span>`;

      // Enrich picks with tournament-scoped match points
      let totalScore = 0;
      const enriched = myPicks.map(pick => {
        const pData     = playerMap[pick.playerId] || {};
        const { stats, tracked, matchCount } = resolveStats(pick.playerId, pData, matchData, tournamentId);
        const pts       = +SCORING.totalFromMatches(pick.playerId, matchData, tournamentId).toFixed(1);
        const breakdown = SCORING.breakdown(stats);
        const history   = SCORING.matchHistory(pick.playerId, matchData, tournamentId);
        totalScore     += pts;
        return { ...pick, pData, stats, pts, breakdown, history, tracked, matchCount };
      });

      totalScore = +totalScore.toFixed(1);

      // Stat summary across roster
      const avgRating = enriched.length
        ? +(enriched.reduce((s, p) => s + (p.stats.rating || 0), 0) / enriched.length).toFixed(2)
        : 0;
      const avgKD = enriched.length
        ? +(enriched.reduce((s, p) => s + (p.stats.kd || 0), 0) / enriched.length).toFixed(2)
        : 0;

      const statusBadge = lobbyData.status === "complete"
        ? `<span style="color:var(--success); font-size:0.8rem; font-weight:600;">✓ Draft Complete</span>`
        : `<span style="color:var(--warn); font-size:0.8rem; font-weight:600;">⏳ Draft In Progress</span>`;

      content.innerHTML = `
        <div class="page-title">${myName}'s Team</div>
        <div class="page-sub">Lobby <span style="font-family:var(--font-mono); color:var(--accent);">${lobbyCode}</span> · ${statusBadge} · ${tournamentLabel}</div>

        <div class="score-hero">
          <div class="score-main">
            <div class="score-label">Total Fantasy Score</div>
            <div class="score-value">${totalScore}</div>
            <div class="score-meta">${enriched.length} / ${CONFIG.ROSTER_SIZE} picks made</div>
          </div>
          <div class="score-breakdown">
            <div class="score-stat">
              <div class="score-stat-val">${avgRating}</div>
              <div class="score-stat-label">Avg Rating</div>
            </div>
            <div class="score-stat">
              <div class="score-stat-val">${avgKD}</div>
              <div class="score-stat-label">Avg K/D</div>
            </div>
            <div class="score-stat">
              <div class="score-stat-val">${enriched.length}</div>
              <div class="score-stat-label">Players</div>
            </div>
          </div>
        </div>

        ${format === "auction" ? `
        <div class="budget-section show">
          <div class="budget-row">
            <span class="budget-label-text">Auction Budget</span>
            <span class="budget-numbers">
              <span class="budget-spent">$${spent} spent</span>
              <span style="color:var(--muted);"> · </span>
              <span class="budget-left">$${remaining} left</span>
            </span>
          </div>
          <div class="budget-track">
            <div class="budget-fill" style="width:${Math.max(0, (remaining / CONFIG.AUCTION_BUDGET) * 100)}%; background:${remaining < 50 ? 'var(--danger)' : remaining < 100 ? 'var(--warn)' : 'var(--success)'};"></div>
          </div>
        </div>` : ""}

        <div class="info-row">
          <div class="info-pill">Format: <strong>${format === "auction" ? "🏷 Auction" : "🐍 Snake"}</strong></div>
          <div class="info-pill">Roster size: <strong>${CONFIG.ROSTER_SIZE} picks</strong></div>
          <a href="standings.html" style="text-decoration:none;">
            <div class="info-pill" style="cursor:pointer; border-color:var(--accent); color:var(--accent);">View Standings →</div>
          </a>
        </div>

        <div class="section-title">Roster</div>

        <div class="roster-grid">
          ${enriched.length === 0 ? `
            <div class="empty-state">
              <div class="empty-state-title">No picks yet</div>
              <p>Head back to the draft room to make your picks.</p>
              <a href="draft.html?code=${lobbyCode}" class="empty-btn">Go to Draft</a>
            </div>
          ` : enriched.map((p, i) => `
            <div class="roster-card">
              <div class="pick-num">${p.label || `${p.round}.${p.pick}`}</div>
              <div class="player-info">
                <div class="player-name">${p.playerName}</div>
                <div class="player-meta">
                  ${p.pData.team || p.playerTeam || "—"} ·
                  ${p.pData.role || p.playerRole || "—"} ·
                  ${p.pData.region || "—"}
                  ${p.skipped ? ' · <span class="skipped-badge">Auto-pick</span>' : ""}
                  ${p.price    ? ` · <span class="price-badge">$${p.price}</span>` : ""}
                  · ${p.tracked
                    ? `<span style="font-size:0.65rem; color:var(--success); font-weight:700;">●Tracked (${p.matchCount})</span>`
                    : `<span style="font-size:0.65rem; color:var(--muted); font-weight:700;">Seeded</span>`}
                </div>
              </div>
              <div class="stat-chips">
                ${p.breakdown.map(b => `
                  <div class="stat-chip">
                    <div class="stat-chip-val">${b.stat === 'CL' ? `${b.value}%` : b.value}</div>
                    <div class="stat-chip-label">${b.stat}</div>
                  </div>
                `).join("")}
              </div>
              <div class="player-pts">
                <div class="player-pts-val">${p.pts}</div>
                <div class="player-pts-label">pts</div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    // ── Init ───────────────────────────────────────────
    async function init() {
      await ensureAuth();
      const { playerData, matchData, tournamentData } = await loadData();

      subscribeLobby(lobbyCode, (lobbyData) => {
        render(lobbyData, playerData, matchData, tournamentData);
      });
    }

    init();
  </script>

</body>
</html>
