<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esports Fantasy Draft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens ───────────────────────────────────────── */
    :root {
      --bg:        #0a0b0f;
      --surface:   #13151c;
      --surface2:  #1c1f2b;
      --border:    #2a2d3a;
      --accent:    #00e5ff;
      --accent2:   #7c3aed;
      --danger:    #ff4757;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --success:   #10b981;

      --font-display: 'Barlow Condensed', sans-serif;
      --font-body:    'Inter', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
    }

    /* ── Reset ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 0 24px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .header-divider { width: 1px; height: 24px; background: var(--border); }

    /* ── Main Layout ──────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ── Views (landing / lobby) ──────────────────────── */
    .view { display: none; width: 100%; max-width: 520px; }
    .view.active { display: block; }

    /* ── Card ─────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .card-sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    /* ── Tabs ─────────────────────────────────────────── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
      gap: 4px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Form Elements ────────────────────────────────── */
    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: border-color 0.15s;
      outline: none;
    }

    input:focus, select:focus { border-color: var(--accent); }

    input.code-input {
      font-family: var(--font-mono);
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
    }

    select option { background: var(--surface2); }

    /* ── Format Toggle ────────────────────────────────── */
    .format-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .format-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 10px;
      color: var(--muted);
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .format-btn .fmt-label { font-size: 1.1rem; display: block; margin-bottom: 4px; }
    .format-btn .fmt-desc  { font-size: 0.7rem; font-family: var(--font-body); font-weight: 400; display: block; }

    .format-btn.active {
      background: color-mix(in srgb, var(--accent) 10%, var(--surface2));
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Buttons ──────────────────────────────────────── */
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover   { opacity: 0.88; }
    .btn:active  { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary  { background: var(--accent); color: var(--bg); }
    .btn-ghost    { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    /* ── Error / Status ───────────────────────────────── */
    .error-msg {
      background: color-mix(in srgb, var(--danger) 12%, transparent);
      border: 1px solid var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--danger);
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.show { display: block; }

    /* ── Lobby / Waiting Room ─────────────────────────── */
    #view-lobby .card-title { margin-bottom: 4px; }

    .lobby-code-display {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 24px;
    }

    .lobby-code-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    .lobby-code-val {
      font-family: var(--font-mono);
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--accent);
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .copy-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Player List ──────────────────────────────────── */
    .players-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .players-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .player-count {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--accent);
    }

    .player-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 80px;
      margin-bottom: 24px;
    }

    .player-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .player-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .player-name { font-size: 0.95rem; font-weight: 500; flex: 1; }

    .host-badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent2);
      background: color-mix(in srgb, var(--accent2) 15%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent2) 40%, transparent);
      border-radius: 4px;
      padding: 2px 7px;
    }

    .you-badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
    }

    .waiting-msg {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 20px 0 0;
    }

    .lobby-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .lobby-actions .btn { flex: 1; margin-top: 0; }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

    .lobby-format-badge {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      border-radius: 4px;
      padding: 3px 9px;
    }

    /* ── Avatar Colors ────────────────────────────────── */
    .av-0 { background: #1a3a4a; color: #00e5ff; }
    .av-1 { background: #2d1f4e; color: #a78bfa; }
    .av-2 { background: #1a3a2a; color: #10b981; }
    .av-3 { background: #3a2a1a; color: #f59e0b; }
    .av-4 { background: #3a1a2a; color: #ec4899; }
    .av-5 { background: #1a2a3a; color: #60a5fa; }
    .av-6 { background: #2a1a1a; color: #f87171; }
    .av-7 { background: #2a2a1a; color: #d4d40a; }

    /* ── Spinner ──────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <a href="home.html" style="text-decoration:none;">
      <div class="logo">Draft<span>Zone</span></div>
    </a>
    <div class="header-divider"></div>
    <nav style="display:flex; gap:4px;">
      <a href="home.html"      style="padding:6px 14px; border-radius:6px; font-size:0.8rem; font-weight:600; letter-spacing:0.04em; text-decoration:none; color:var(--muted); transition:color 0.15s, background 0.15s;">Home</a>
      <a href="stats.html"     style="padding:6px 14px; border-radius:6px; font-size:0.8rem; font-weight:600; letter-spacing:0.04em; text-decoration:none; color:var(--muted);">Stats</a>
      <a href="index.html"     style="padding:6px 14px; border-radius:6px; font-size:0.8rem; font-weight:600; letter-spacing:0.04em; text-decoration:none; color:var(--accent); background:color-mix(in srgb, var(--accent) 10%, transparent);">Draft</a>
      <a href="dashboard.html" style="padding:6px 14px; border-radius:6px; font-size:0.8rem; font-weight:600; letter-spacing:0.04em; text-decoration:none; color:var(--muted);">My Team</a>
      <a href="standings.html" style="padding:6px 14px; border-radius:6px; font-size:0.8rem; font-weight:600; letter-spacing:0.04em; text-decoration:none; color:var(--muted);">Standings</a>
    </nav>
  </header>

  <main>

    <!-- ── Landing View ──────────────────────────────── -->
    <div id="view-landing" class="view active">
      <div class="card">
        <div class="card-title">Esports Fantasy Draft</div>
        <div class="card-sub">Create a lobby or join with a code</div>

        <div class="tabs">
          <button class="tab active" data-tab="create">Create</button>
          <button class="tab"        data-tab="join">Join</button>
        </div>

        <!-- Create Tab -->
        <div id="tab-create">
          <div class="field">
            <label>Your Name</label>
            <input id="create-name" type="text" placeholder="Enter your name" maxlength="24" />
          </div>

          <div class="field">
            <label>Tournament</label>
            <select id="create-tournament">
              <option value="">Loading tournaments…</option>
            </select>
          </div>

          <div class="field">
            <label>Draft Format</label>
            <div class="format-toggle">
              <button class="format-btn active" data-format="snake">
                <span class="fmt-label">🐍 Snake</span>
                <span class="fmt-desc">Turn-based, reversing order</span>
              </button>
              <button class="format-btn" data-format="auction">
                <span class="fmt-label">🏷 Auction</span>
                <span class="fmt-desc">$200 budget per player</span>
              </button>
            </div>
          </div>

          <div id="create-error" class="error-msg"></div>
          <button class="btn btn-primary" id="btn-create">Create Lobby</button>
        </div>

        <!-- Join Tab -->
        <div id="tab-join" style="display:none">
          <div class="field">
            <label>Your Name</label>
            <input id="join-name" type="text" placeholder="Enter your name" maxlength="24" />
          </div>
          <div class="field">
            <label>Lobby Code</label>
            <input id="join-code" class="code-input" type="text" placeholder="ABC123" maxlength="6" />
          </div>

          <div id="join-error" class="error-msg"></div>
          <button class="btn btn-primary" id="btn-join">Join Lobby</button>
        </div>

      </div>
    </div>

    <!-- ── Lobby / Waiting Room View ─────────────────── -->
    <div id="view-lobby" class="view">
      <div class="card">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;">
          <div class="card-title">Lobby</div>
          <span id="lobby-format-badge" class="lobby-format-badge">Snake</span>
        </div>
        <div class="card-sub" id="lobby-sub">Share the code below with your friends</div>
        <div id="lobby-tournament-name" style="font-size:0.8rem; color:var(--accent); margin-bottom:12px; display:none;"></div>

        <div class="lobby-code-display">
          <div>
            <div class="lobby-code-label">Lobby Code</div>
            <div class="lobby-code-val" id="lobby-code-display">———</div>
          </div>
          <button class="copy-btn" id="btn-copy-code">Copy</button>
        </div>

        <div class="players-header">
          <div class="players-label">Players</div>
          <div class="player-count" id="player-count">0 / 16</div>
        </div>

        <ul class="player-list" id="player-list"></ul>

        <div id="lobby-error" class="error-msg"></div>

        <!-- Host sees Start Draft; others see waiting message -->
        <div class="lobby-actions">
          <button class="btn btn-primary" id="btn-start" style="display:none">Start Draft</button>
          <button class="btn btn-danger"  id="btn-leave">Leave Lobby</button>
        </div>
        <div class="waiting-msg" id="waiting-msg" style="display:none">
          <span class="spinner"></span> Waiting for host to start the draft…
        </div>
      </div>
    </div>

  </main>

  <script type="module">
    import {
      db, auth, ref, set, get, update, onValue,
      ensureAuth, LS, generateCode, createLobby, joinLobby,
      lobbyExists, subscribeLobby, CONFIG
    } from "./app.js";

    // ── State ──────────────────────────────────────────
    let selectedFormat = "snake";
    let currentUid     = null;
    let unsubLobby     = null;
    let tournamentsData = [];

    // ── Load tournaments into select ───────────────────
    (async () => {
      try {
        tournamentsData = await fetch("data/tournaments.json").then(r => r.json());
        const sel = document.getElementById("create-tournament");
        sel.innerHTML = "";
        tournamentsData.forEach(t => {
          const opt = document.createElement("option");
          opt.value = t.id;
          const statusLabel = t.status === "ongoing" ? " 🟡 Live" : t.status === "upcoming" ? " 🔵 Upcoming" : " ⚫ Completed";
          opt.textContent = `${t.name}${statusLabel}`;
          sel.appendChild(opt);
        });
      } catch {
        document.getElementById("create-tournament").innerHTML = `<option value="">Failed to load tournaments</option>`;
      }
    })();

    // ── Tab switching ──────────────────────────────────
    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("tab-create").style.display = btn.dataset.tab === "create" ? "block" : "none";
        document.getElementById("tab-join").style.display   = btn.dataset.tab === "join"   ? "block" : "none";
      });
    });

    // ── Format toggle ──────────────────────────────────
    document.querySelectorAll(".format-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".format-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedFormat = btn.dataset.format;
      });
    });

    // ── View helpers ───────────────────────────────────
    function showView(id) {
      document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add("show");
    }

    function clearError(id) {
      document.getElementById(id).classList.remove("show");
    }

    // ── Avatar color helper ────────────────────────────
    const avatarClass = (i) => `av-${i % 8}`;

    // ── Render player list ─────────────────────────────
    function renderPlayers(players, myUid, hostId) {
      const list  = document.getElementById("player-list");
      const count = document.getElementById("player-count");
      const entries = Object.entries(players || {});
      count.textContent = `${entries.length} / 16`;
      list.innerHTML = "";

      entries.forEach(([uid, p], i) => {
        const li = document.createElement("li");
        li.className = "player-item";

        const initial = (p.name || "?")[0].toUpperCase();
        li.innerHTML = `
          <div class="player-avatar ${avatarClass(i)}">${initial}</div>
          <div class="player-name">${p.name}</div>
          ${uid === hostId ? '<span class="host-badge">Host</span>' : ""}
          ${uid === myUid  ? '<span class="you-badge">You</span>'   : ""}
        `;
        list.appendChild(li);
      });
    }

    // ── Enter lobby view ───────────────────────────────
    function enterLobby(code, isHost, lobbyData) {
      showView("view-lobby");
      document.getElementById("lobby-code-display").textContent = code;
      document.getElementById("lobby-format-badge").textContent =
        lobbyData.format === "auction" ? "🏷 Auction" : "🐍 Snake";

      // Show tournament name
      if (lobbyData.tournamentId) {
        const t = tournamentsData.find(t => t.id === lobbyData.tournamentId);
        const nameEl = document.getElementById("lobby-tournament-name");
        nameEl.textContent = `📋 ${t?.name || lobbyData.tournamentId}`;
        nameEl.style.display = "block";
      }

      // Host controls vs non-host
      if (isHost) {
        document.getElementById("btn-start").style.display  = "block";
        document.getElementById("waiting-msg").style.display = "none";
      } else {
        document.getElementById("btn-start").style.display  = "none";
        document.getElementById("waiting-msg").style.display = "block";
      }

      // Copy code button
      document.getElementById("btn-copy-code").addEventListener("click", () => {
        navigator.clipboard.writeText(code).then(() => {
          document.getElementById("btn-copy-code").textContent = "Copied!";
          setTimeout(() => document.getElementById("btn-copy-code").textContent = "Copy", 1500);
        });
      });

      // Live player list
      if (unsubLobby) unsubLobby();
      unsubLobby = subscribeLobby(code, (data) => {
        // Lobby was deleted (host left)
        if (!data) {
          if (unsubLobby) unsubLobby();
          LS.clearSession();
          showView("view-landing");
          showError("create-error", "The host closed the lobby.");
          document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          document.querySelector(".tab[data-tab='create']").classList.add("active");
          document.getElementById("tab-create").style.display = "block";
          document.getElementById("tab-join").style.display   = "none";
          return;
        }
        renderPlayers(data.players, currentUid, data.hostId);

        // Enable start button only if 2+ players
        const playerCount = Object.keys(data.players || {}).length;
        document.getElementById("btn-start").disabled = playerCount < 2;

        // If status flips to "drafting", redirect everyone
        if (data.status === "drafting") {
          window.location.href = `draft.html?code=${code}`;
        }
      });
    }

    // ── Create Lobby ───────────────────────────────────
    document.getElementById("btn-create").addEventListener("click", async () => {
      clearError("create-error");
      const name         = document.getElementById("create-name").value.trim();
      const tournamentId = document.getElementById("create-tournament").value;
      if (!name)         return showError("create-error", "Enter your name.");
      if (!tournamentId) return showError("create-error", "Select a tournament.");

      const btn = document.getElementById("btn-create");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating…';

      try {
        const user = await ensureAuth();
        currentUid = user.uid;
        const code = generateCode();

        await createLobby({ code, hostUid: currentUid, hostName: name, format: selectedFormat, tournamentId });
        LS.saveSession({ uid: currentUid, name, lobbyCode: code, isHost: true });

        const snap = await get(ref(db, `lobbies/${code}`));
        enterLobby(code, true, snap.val());
      } catch (err) {
        console.error(err);
        showError("create-error", "Failed to create lobby. Check your connection.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Create Lobby";
      }
    });

    // ── Join Lobby ─────────────────────────────────────
    document.getElementById("btn-join").addEventListener("click", async () => {
      clearError("join-error");
      const name = document.getElementById("join-name").value.trim();
      const code = document.getElementById("join-code").value.trim().toUpperCase();
      if (!name) return showError("join-error", "Enter your name.");
      if (code.length !== 6) return showError("join-error", "Enter a valid 6-character code.");

      const btn = document.getElementById("btn-join");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Joining…';

      try {
        const lobby = await lobbyExists(code);
        if (!lobby) return showError("join-error", "Lobby not found. Check the code.");
        if (lobby.status !== "waiting") return showError("join-error", "This draft has already started.");

        const user = await ensureAuth();
        currentUid = user.uid;

        await joinLobby({ code, uid: currentUid, name });
        LS.saveSession({ uid: currentUid, name, lobbyCode: code, isHost: false });
        enterLobby(code, false, lobby);
      } catch (err) {
        console.error(err);
        showError("join-error", "Failed to join lobby. Check the code and try again.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Join Lobby";
      }
    });

    // ── Leave Lobby ────────────────────────────────────
    document.getElementById("btn-leave").addEventListener("click", async () => {
      const session = LS.getSession();
      if (!session) { showView("view-landing"); return; }

      const { lobbyCode, isHost } = session;
      const msg = isHost
        ? "You're the host. Leaving will close the lobby for everyone. Are you sure?"
        : "Are you sure you want to leave this lobby?";

      if (!confirm(msg)) return;

      try {
        if (isHost) {
          // Delete the entire lobby so all listeners get null and can react
          await set(ref(db, `lobbies/${lobbyCode}`), null);
        } else {
          // Just remove this player from the lobby
          await set(ref(db, `lobbies/${lobbyCode}/players/${currentUid}`), null);
        }
      } catch (err) {
        console.error("Leave failed:", err);
      } finally {
        if (unsubLobby) unsubLobby();
        LS.clearSession();
        showView("view-landing");
      }
    });

    // ── Start Draft (host only) ────────────────────────
    document.getElementById("btn-start").addEventListener("click", async () => {
      const session = LS.getSession();
      if (!session) return;
      const { lobbyCode } = session;

      const btn = document.getElementById("btn-start");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Starting…';

      try {
        // Build randomised pick order from current player list
        const snap = await get(ref(db, `lobbies/${lobbyCode}/players`));
        const uids = Object.keys(snap.val() || {});
        const shuffled = uids.sort(() => Math.random() - 0.5);

        await update(ref(db, `lobbies/${lobbyCode}`), {
          status:    "drafting",
          pickOrder: shuffled,
        });
        // onValue listener above will redirect everyone to draft.html
      } catch (err) {
        console.error(err);
        showError("lobby-error", "Failed to start draft.");
        btn.disabled = false;
        btn.textContent = "Start Draft";
      }
    });

    // ── Rejoin on page load ────────────────────────────
    (async () => {
      const session = LS.getSession();
      if (!session) return;

      try {
        const user  = await ensureAuth();
        currentUid  = user.uid;
        const lobby = await lobbyExists(session.lobbyCode);
        if (!lobby) { LS.clearSession(); return; }

        if (lobby.status === "drafting") {
          window.location.href = `draft.html?code=${session.lobbyCode}`;
          return;
        }

        enterLobby(session.lobbyCode, session.isHost, lobby);
      } catch (err) {
        console.error("Rejoin failed:", err);
        LS.clearSession();
      }
    })();

    // ── Code input auto-uppercase ──────────────────────
    document.getElementById("join-code").addEventListener("input", function () {
      this.value = this.value.toUpperCase();
    });
  </script>

</body>
</html>
